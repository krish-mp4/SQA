<div class="NewHeader">
  <h1 mat-dialog-title>
    <span> Update Step </span>
  </h1>
</div>

<form class="form-horizontal">
  <div mat-dialog-content>

    <div class="form-group">
      <label class="control-label col-sm-4 add-member-label">Step Name: </label>
      <div class="col-lg-8 col-md-8 col-sm-8 col-xs-8">
        <input type="text" class="form-control" placeholder="Enter Step Name">
      </div>
    </div>
     <div class="form-group">
      <label class="control-label col-sm-4 add-member-label">Responsibility: </label>
      <div class="col-lg-8 col-md-8 col-sm-8 col-xs-8">
        <input type="text" class="form-control" placeholder="Enter Responsibility">
      </div>
    </div>
    <div class="form-group">
      <label class="control-label col-sm-4 ">Start Date: </label>
      <div class="col-lg-8 col-md-8 col-sm-8 col-xs-8">
        <input type="date" class="form-control" placeholder="">
      </div>
    </div>
    <div class="form-group">
      <label class="control-label col-sm-4 ">Finish Date:</label>
      <div class="col-lg-8 col-md-8 col-sm-8 col-xs-8">
        <input type="date" class="form-control" placeholder="">
      </div>
    </div>
    <div class="form-group">
  <label class="control-label col-sm-4">Done:</label>
  
  <div class="col-sm-8">
    <div class="checkbox">
      <label>
        <input type="checkbox" class="p-2"> 
      </label>
    </div>
  </div>
</div>

  </div>
  <mat-dialog-actions align="end" style="margin-right: -6px;">
    <button mat-raised-button color="primary" type="button" (click)="close()">
      <mat-icon>save</mat-icon><span> {{ data ? 'Update' : 'Save'}}</span>
    </button>
    <button mat-raised-button (click)="close()" type="button" style="background-color: lightgray; color: red">
      <mat-icon>cancel</mat-icon> Close
    </button>

  </mat-dialog-actions>
</form>
