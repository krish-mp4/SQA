<div class="col-sm-12" style="
    max-width: 100%;
    padding: 0;
    margin: 0;
    box-sizing: border-box;
  ">
    <div class="NewHeader">
        <h1 style="color: white; margin-top:5px" mat-dialog-title>
            {{ data ? "Update" : "Add" }} Section
        </h1>
    </div>
    <div mat-dialog-content>
        <form class="form-horizontal">
            <!-- Complaint -->
            <div class="form-group" style="margin-top: 20px">
                <label class="control-label col-sm-4 "> Section:
                </label>
                <div class="col-lg-8 col-md-8 col-sm-8 col-xs-8">
                    <input type="text" class="form-control" placeholder="Enter Section" />
                </div>
            </div>
            <div class="form-group" style="margin-top: 20px">
                <label class="control-label col-sm-4 "> Department:
                </label>
                <div class="col-lg-8 col-md-8 col-sm-8 col-xs-8">
                    <mat-select placeholder="Select Department" class="form-control">
                        <mat-option value="Account">Account</mat-option>
                        <mat-option value="RnD">RnD</mat-option>
                        <mat-option value="QA">QA</mat-option>
                    </mat-select>
                </div>
            </div>
            <div class="form-group" style="margin-top: 20px">
                <label class="control-label col-sm-4 "> Lead:
                </label>
                <div class="col-lg-8 col-md-8 col-sm-8 col-xs-8">
                  <mat-select placeholder="Select Department" class="form-control" multiple>
                        <mat-option value="Account">Ayush</mat-option>
                        <mat-option value="RnD">Gaurav</mat-option>
                        <mat-option value="QA">Satya</mat-option>
                    </mat-select>
                </div>
            </div>




        </form>
    </div>
    <mat-dialog-actions align="end">
        <div class="margin-bottom-10" style="margin-top: 30px; margin-right: -3px; margin-bottom: 11px;">
              <button mat-raised-button class="ms-2" (click)="close()"
        style="background-color: lightgray; color: red;margin-right: 2px;">
        <mat-icon>cancel</mat-icon>
        Close
      </button>
            <button mat-raised-button color="primary" [mat-dialog-close]="'test'">
                <mat-icon style="font-size:20px" class="mt-1">save</mat-icon> <span style="margin-left: 5px;">{{ data ?
                    "Update" : "Save" }}</span>
            </button>
            
        </div>
    </mat-dialog-actions>
</div>
