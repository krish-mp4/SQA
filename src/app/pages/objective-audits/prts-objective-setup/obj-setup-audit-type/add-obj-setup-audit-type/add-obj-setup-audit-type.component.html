<div class="NewHeader">
  <h1 mat-dialog-title>
    <span>{{ data ? 'Update' : 'Add'}} Audit Type</span>
  </h1>
</div>

<form class="form-horizontal">
  <div mat-dialog-content>

    <div class="form-group">
      <label class="control-label col-sm-4 ">Audit Type </label>
      <div class="col-lg-8 col-md-8 col-sm-8 col-xs-8">
        <input type="text" class="form-control" placeholder="Enter Audit Type">
      </div>
    </div>

  </div>
  <mat-dialog-actions align="end" style="margin-bottom: -13px;">
    <button mat-raised-button class="ms-2" (click)="close()"
      style="background-color: lightgray; color: red;margin-right: 2px;">
      <mat-icon>cancel</mat-icon>
      Close
    </button>
    <button mat-raised-button color="primary" class="btn-primary" type="button" (click)="close()">
      <mat-icon>save</mat-icon><span> {{ data ? 'Update' : 'Save'}}</span>
    </button>


  </mat-dialog-actions>
</form>
