<div class="col-sm-12">
  <div style="margin-left:-6px;margin-top:10px; padding-right: 0px; ">
    <div id="grid-table-container" class="table-responsive" style="width: 99%;">
      <div class="container-fluid">
        <div class="w-100">
          <div class="flex-p">
            <div class="row wrap">
              <div class="col-sm-12 no-padding" style="margin-left: 2px;
    margin-bottom: -10px;">
                <div class="row-wrap">
                  <div class="w-100">
                    <div class="row pull-right" style="margin-right: -5px;">
                      <div>
                        <button style="margin-bottom: 7px" mat-raised-button color="primary"
                          class="pull-right  btn-primary margin-right-5 mt-3" (click)="addcategory(null)">
                          <mat-icon>add</mat-icon> Add Categories
                        </button>
                        <button style="margin-bottom: 7px" mat-raised-button
                          style="background-color: black;color: white;"
                          class="pull-right filters-hover margin-right-10 mt-3" (click)="filterToggle = !filterToggle">
                          <mat-icon>filter_list</mat-icon> Filter
                        </button>
                      </div>

                     


                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div fxLayout="row wrap" *ngIf="filterToggle">
        <div fxFlex="100" fxFlex.gt-sm fxFlex.sm class="flex-p w-100 margins">
          <mat-card class="filter">

            <mat-card-content>
              <div class="row" style="padding-top:10px !important;margin-left: -65px;">
                <div class="col-sm-4">
                  <div class="col-sm-4">
                    <label class="pull-right" style="margin-top: 6px;">Keyword:</label>
                  </div>
                 <div class="col-sm-8">
                <input type="text" placeholder="Search by Keyword" class="form-control">
                  
                  </div>
                </div>

                <div class="col-sm-4">
                  <div class="col-sm-4">
                    <label class="pull-right" style="margin-top: 6px;">Audit Type:</label>
                  </div>
                  <div class="col-sm-8">
                    <mat-select class="form-control" placeholder="Select Audit Type"required>
                      <mat-option *ngFor="let option of Status" [value]="option.value">
                        {{option.name}}
                      </mat-option>

                    </mat-select>
                  </div>
                </div>

                <div class="col-sm-4">
                  <div class="col-sm-4  ">
                    <label class="pull-right" style="margin-top: 6px;">Status:</label>
                  </div>
                  <div class="col-sm-8">
                    <mat-select class="form-control" placeholder="Select Status"required>
                      <mat-option *ngFor="let option of Status" [value]="option.value">
                        {{option.name}}
                      </mat-option>

                    </mat-select>
                  </div>
                </div>


               

              </div>
             

          
        <div class="row" style="margin-top: 20px;">
  <div class="col-12 d-flex justify-content-end align-items-center gap-3">
    <!-- Toggle Icon -->
   

    <!-- Clear Button -->
  

    <!-- Search Button -->
    <button mat-raised-button color="primary"
            (click)="getTests()">
      <mat-icon>search</mat-icon> Search
    </button>

      <button mat-raised-button class="btn-default"
            (click)="clearFilter(); getTests()">
      <mat-icon>settings_backup_restore</mat-icon> Clear
    </button>
     <a (click)="filterToggle = !filterToggle"  
       style="font-size: 25px; cursor: pointer;">
      <i class="fa fa-angle-double-up" aria-hidden="true"></i>
    </a>
  </div>
</div>
            </mat-card-content>
          </mat-card>
        </div>
      </div>

      <div class="col-sm-12" width="101%">
        <table style="margin-top: 7px; padding-left: 0px; padding-right: 0px;" matSort id="example2"
          class="table table-bordered table-hover">

          <thead class="tbl-head">
            <tr>
              <th class="theadcolor text-center">Actions</th>
              <th class="theadcolor text-center">Status</th>


              <th class="theadcolor ">Categories</th>
              <th class="theadcolor text-center">Audit Type</th>
              <!-- <th class="theadcolor text-center">Thumnail</th> -->
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of values">
              <td class="text-center editDel">
                <a style="cursor: pointer;margin-right:10px; " matTooltip="Edit" (click)="addcategory(item)">
                  <i class="fa fa-edit" style="color: cornflowerblue"></i>
                </a>
                <a>
                  <i class="fa fa-trash red" matTooltip="Delete" style="cursor: pointer;"
                    (click)="deleteConfirmation(item)"></i>
                </a>

              </td>

              <td class="text-center" style="text-align: center !important">
                <a [ngStyle]="{
                          color: item.status ? 'blue' : 'red',
                          cursor: 'pointer'
                        }" [ngClass]="{ 'disable-custom': !canUpdate }">
                  <span (click)="Confirmation(item)">
                    {{ item.status ? "Active" : "Inactive" }}
                  </span>
                </a>
              </td>

              <td class="">{{item.category}}</td>
        <td style="color:blue; cursor:pointer" class="text-center" (click)="openAuditTypes()">4/8</td>
              <!-- <td class="text-center">
                  <mat-icon style="cursor: pointer;" (click)="imageSource()">visibility
                  </mat-icon>

                </td> -->


            </tr>
          </tbody>


        </table>
        <mat-paginator [length]="4" [pageIndex]="0" [pageSize]="4" [pageSizeOptions]="[5, 10, 25, 50, 100]"
          showFirstLastButtons></mat-paginator>
      </div>
      <!-- <div class="col-sm-2">

          <img style="height: 130px;" [src]="url" *ngIf="hidden" />
        </div> -->
    </div>
  </div>
</div>
