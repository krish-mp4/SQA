<!-- Table -->
<div class="col-sm-12">
  <div class="col-xs-12" style="margin-left:8px;margin-top:10px; padding-left: 0px; padding-right: 0px;">
    <div id="grid-table-container" class="table-responsive" style="width: 99%;">
      <div class="container-fluid">
        <div class="w-100">
          <div class="flex-p ">
            <div class="row wrap">
              <div class="col-sm-12 no-padding" style="margin-bottom: -11px;
    margin-left: -5px;">
                <div class="row-wrap">
                  <div class="w-100">
                    <div class="row pull-right" style="margin-right: -20px;">

                      <div class="">

                        <button style="margin-bottom: 7px" mat-raised-button color="primary"
                          class="pull-right  btn-primary margin-right-1 mt-3" (click)="addmeasurement(null)">
                          <mat-icon>add</mat-icon> Add Parameter
                        </button>
                        <button style="margin-bottom: 7px" mat-raised-button
                          style="background-color: black;color: white;"
                          class="pull-right filters-hover margin-right-10 mt-3" (click)="filterToggle = !filterToggle">
                          <mat-icon>filter_list</mat-icon> Filter
                        </button>
                        <!-- <button  mat-raised-button style="margin-right: 12px;" color="primary" class="pull-right  mt-3"  (click)="addgrid()">
                                  <mat-icon>grid_on</mat-icon>Manage Grid
                                  </button> -->

                      </div>


                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Filter Toggle -->

      <div fxLayout="row wrap" *ngIf="filterToggle">
        <div fxFlex="100" fxFlex.gt-sm fxFlex.sm class="flex-p w-100 margins">
          <mat-card class="filter">

            <mat-card-content>
              <div class="row" style="padding-top:10px !important">
                <div class="col-sm-5">
                  <div class="col-sm-3">
                    <label class="pull-right" style="margin-top: 6px;">Measuremnent:</label>
                  </div>
                  <div class="col-sm-6">
                    <mat-select class="form-control" placeholder="Select Model:" required>
                      <mat-option [value]="0">Gap</mat-option>
                      <mat-option [value]="1">Flush</mat-option>
                      <mat-option [value]="1">Alignment</mat-option>
                      <mat-option [value]="1">Parallelism</mat-option>
                      <mat-option [value]="1">Consistency</mat-option>
                    </mat-select>
                  </div>
                </div>

                <div class="col-sm-5">
                  <div class="col-sm-3">
                    <label class="pull-right" style="margin-top: 6px;">Status:</label>
                  </div>
                  <div class="col-sm-6">
                    <mat-select class="form-control" placeholder="Select Status" required>
                      <mat-option *ngFor="let option of Status" [value]="option.value">
                        {{option.name}}
                      </mat-option>

                    </mat-select>
                  </div>
                </div>


             

              </div>

             
        <div class="row">
  <div class="col-12 d-flex justify-content-end align-items-center gap-3">
    <!-- Toggle Icon -->
   

    <!-- Clear Button -->
  

    <!-- Search Button -->
    <button mat-raised-button color="primary"
            (click)="getTests()">
      <mat-icon>search</mat-icon> Search
    </button>

      <button mat-raised-button class="btn-default"
            (click)="clearFilter(); getTests()">
      <mat-icon>settings_backup_restore</mat-icon> Clear
    </button>
     <a (click)="filterToggle = !filterToggle"  
       style="font-size: 25px; cursor: pointer;">
      <i class="fa fa-angle-double-up" aria-hidden="true"></i>
    </a>
  </div>
</div>
            </mat-card-content>
          </mat-card>
        </div>
      </div>

      <!-- filter Toggle -->


      <table style="margin-top: 7px;padding-left: 0px; padding-right: 0px;width: 99.5%;" matSort id="example2"
        class="table table-bordered table-hover">
        <thead class="tbl-head">
          <tr>
            <th class="theadcolor text-center">Actions</th>
            <th class="theadcolor text-center">Status</th>


            <th class="theadcolor">Measurement Name</th>
            <!-- <th class="theadcolor">Category Name</th>
            <th class="theadcolor">Audit Type</th> -->
            <th class="theadcolor">Color Code</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of values">
            <td class="text-center editDel">
              <a style="cursor: pointer;margin-right:10px; " matTooltip="Edit" (click)="addmeasurement(item)">
                <i class="fa fa-edit" style="color: cornflowerblue"></i>
              </a>
              <a>
                <i class="fa fa-trash red" matTooltip="Delete" style="cursor: pointer;"
                  (click)="deleteConfirmation(item)"></i>
              </a>
            </td>

            <td class="text-center" style="text-align: center !important">
              <a [ngStyle]="{
                          color: item.status ? 'blue' : 'red',
                          cursor: 'pointer'
                        }" [ngClass]="{ 'disable-custom': !canUpdate }">
                <span (click)="Confirmation(item)">
                  {{ item.status ? "Active" : "Inactive" }}
                </span>
              </a>
            </td>

            <td>{{item.measurement}}</td>
            <!-- <td>{{item.category}}</td>
            <td>{{item.Audit}}</td> -->
            <td>
              <span class="text-center" [style.background-color]="item.ColorCode">
                <div class="center" style="width: 25px; height: 15px;" [style.background-color]="item.ColorCode">
                  &nbsp;&nbsp;
                </div>
              </span>
            </td>


          </tr>
        </tbody>
      </table>
      <mat-paginator [length]="4" [pageIndex]="0" [pageSize]="4" [pageSizeOptions]="[5, 10, 25, 50, 100]"
        showFirstLastButtons></mat-paginator>
    </div>
  </div>
</div>
