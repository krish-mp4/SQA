<div class="page-header  ms-5 d-flex justify-content-between align-items-start" style="padding-top: 20px;">

    <!-- Left Content -->
    <div class="header-content">
        <h3 class="page-title mb-1">Mitigation</h3>

        <p class="header-info mb-0">
            <span class="fw-bold">Ref No:</span>
            PSR-24001

            <span class="ms-3 fw-bold">Subject:</span>
            Paint Defect
        </p>
    </div>

    <!-- Back Button -->
    <button class="btn btn-grey back-btn me-5" (click)="goBack()">
        <mat-icon class="me-1">arrow_back</mat-icon>
        Back
    </button>

</div>

<div class="editor-container ms-5 mt-4">
  <quill-editor [(ngModel)]="content" [modules]="modules" placeholder="Insert text here ...">
  </quill-editor>
</div>

<!-- Button aligned below editor -->
<div class="d-flex justify-content-end mt-3">
  <button mat-raised-button type="button" style="color: #fbfdfb; background-color: #0a5db6;">
    <mat-icon>save</mat-icon>
    Save
  </button>
</div>
