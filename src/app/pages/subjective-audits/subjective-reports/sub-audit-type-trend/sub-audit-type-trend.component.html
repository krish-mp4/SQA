<div fxLayout="row wrap" style="margin-bottom: 10px;margin-top: 0px;;margin-left:10px;margin-right:5px" *ngIf="filterToggle">
    <div fxFlex="100" fxFlex.gt-sm fxFlex.sm class="flex-p w-100 margins">
        <mat-card class="filter">
            <mat-card-content>
                <div class="row">
                    <!-- Select Period -->
                    <div class="col-sm-4">
                        <div class="col-sm-4 newMarginClass">Select Period:</div>
                        <div class="col-sm-8">
                            <mat-select class="form-control" placeholder="Select Period"
                                (selectionChange)="fnYearChange($event)" required>
                                <mat-option [value]="0">Last 2 Years</mat-option>
                                <mat-option [value]="1">Last 3 Years</mat-option>
                            </mat-select>
                        </div>
                    </div>

                    <!-- Audit Type -->
                    <div class="col-sm-4">
                        <div class="col-sm-4 newMarginClass">Audit Type:</div>
                        <div class="col-sm-8">
                            <mat-select class="form-control" placeholder="Select Audit Type" required>
                                <mat-option [value]="0">Product Quality Audit</mat-option>
                                <mat-option [value]="1">Body Audit</mat-option>
                                <mat-option [value]="2">Paint Audit</mat-option>
                            </mat-select>
                        </div>
                    </div>

                    <!-- To Date -->
                    <div class="col-sm-4 mt-2">

<!-- Bar Graph -->
<div fxLayout="column" fxLayout.gt-sm="row wrap">
    <div fxFlex="100" class="flex-p">
        <mat-card style="width: 99%;
    margin-left: 6px;">
            <mat-card-header fxLayoutAlign="center center">
                <mat-card-subtitle>
                    <h2>Demerit by Audit Type</h2>
                </mat-card-subtitle>
            </mat-card-header>
            <div class="w-100 h-300p">
                <ngx-charts-bar-vertical [scheme]="colorScheme" [gradient]="gradient" [xAxis]="showXAxis"
                    [yAxis]="showYAxis" [legend]="showLegend" [showXAxisLabel]="showXAxisLabel"
                    [showYAxisLabel]="showYAxisLabel" [xAxisLabel]="xAxisLabel" [yAxisLabel]="yAxisLabel"
                    [results]="second">
                </ngx-charts-bar-vertical>
            </div>
        </mat-card>
    </div>

</div>

<div id="grid-table-container" class="col-sm-12 table-responsive mt-4">
    <table matSort id="example2" class="table table-bordered table-hover">
        <thead class="tbl-head">
            <tr>
                <th class="text-center">Audit Type</th>
                <th class="text-center">Demerit</th>
                <!-- <th class="text-center">Compilance</th> -->
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let item of items">
                <td class="text-center">{{item.model }}</td>
                <td class="text-center">{{item.issues }}</td>
                <!-- <td class="text-center">{{item.demerit }}</td> -->
            </tr>
            <tr>
                <td class="text-center">Average</td>
                <!-- <td class="text-center">90</td> -->
                <td class="text-center">80%</td>
            </tr>
        </tbody>
    </table>

</div>
