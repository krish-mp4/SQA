<div class="col-lg-4 col-sm-4" style="margin-bottom: 21px;
    margin-left: -6px;">
        <div class="form-group">
            <label class="control-label col-sm-4 mt-2">Select Period: </label>
            <div class="col-lg-6 col-md-6 col-sm-6 col-xs-6 mt-1">
                <mat-select class="form-control" [value]="0">
                    <mat-option [value]="0">This Year (2025)</mat-option>
                    <mat-option [value]="1">Last Years</mat-option>
                    <mat-option [value]="2">Last 60 Days</mat-option>
                    <mat-option [value]="3">Last 6 Months</mat-option>
                    <mat-option [value]="4">Last 12 Months</mat-option>
                    <mat-option [value]="5">Last 2 Years</mat-option>
                </mat-select>
            </div>
        </div>
    </div>

<div fxLayout="row wrap" style="margin-bottom: 10px;margin-top: -25px;;margin-left:10px;margin-right:5px " *ngIf="filterToggle">
    <div fxFlex="100" fxFlex.gt-sm fxFlex.sm class="flex-p w-100 margins">
        <mat-card class="filter">
            <mat-card-content>
                <div class="row">
                    <div class="col-sm-4">
                        <div class="col-sm-4 newMarginClass">Select Period:</div>
                        <div class="col-sm-8">
                            <mat-select class="form-control" placeholder="Select Period"
                                (selectionChange)="fnYearChange($event)" required>
                                <mat-option [value]="0">Last 2 Years</mat-option>
                                <mat-option [value]="1">Last 3 Years</mat-option>
                            </mat-select>
                        </div>
                    </div>

                    <div class="col-sm-4">
                        <div class="col-sm-4 newMarginClass">Audit Type:</div>
                        <div class="col-sm-8">
                            <mat-select class="form-control" placeholder="Select Audit Type" required>
                                <mat-option [value]="0">Product Quality Audit</mat-option>
                                <mat-option [value]="1">Body Audit</mat-option>
                                <mat-option [value]="2">Paint Audit</mat-option>
                            </mat-select>
                        </div>
                    </div>

                    <div class="col-sm-4 mt-2">
                        <div class="col-sm-4 newMarginClass">From Date:</div>
                        <div class="col-sm-8">
                            <input type="date" class="form-control">
                        </div>
                    </div>

                    <div class="col-sm-4 mt-2">
                        <div class="col-sm-4 newMarginClass">To Date:</div>
                        <div class="col-sm-8">
                            <input type="date" class="form-control">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-12 d-flex justify-content-end align-items-center gap-3">
                            <button mat-raised-button color="primary"
                                (click)="getTests()">
                                <mat-icon>search</mat-icon> Search
                            </button>

                            <button mat-raised-button class="btn-default"
                                (click)="clearFilter(); getTests()">
                                <mat-icon>settings_backup_restore</mat-icon> Clear
                            </button>
                            <a (click)="filterToggle = !filterToggle"
                                style="font-size: 25px; cursor: pointer;">
                                <i class="fa fa-angle-double-up" aria-hidden="true"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </mat-card-content>
        </mat-card>
    </div>
</div>

<div  >
  

    <div  fxLayout="column" fxLayout.gt-sm="row wrap">
        <mat-card style="width: 97.50%;
    margin-left: 15px;">
            <div class="chart-header">
                <h4>Demerit Distribution by Category</h4>
            </div>
            <div style="height: 300px; width: 99%;"> <ngx-charts-bar-vertical
                    [results]="first"
                    [xAxis]="true"
                    [yAxis]="true"
                    [legend]="false"
                    [showXAxisLabel]="true"
                    [showYAxisLabel]="true"
                    xAxisLabel="Category"
                    yAxisLabel="Demerit"
                    [scheme]="colorScheme"
                    [gradient]="gradient">
                </ngx-charts-bar-vertical>
            </div>
        </mat-card>
    </div>


      <div id="grid-table-container" class="col-sm-12 table-responsive mt-4" >
        <div id="grid-table-container" class="table-responsive mt-4">
            <table matSort id="example2" class="table table-bordered table-hover">
                <thead class="tbl-head">
                    <tr>
                        <th class="text-center">Category</th>
                        <th class="text-center">Demerit</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let item of items">
                        <td class="text-center">{{item.model }}</td>
                        <td class="text-center">{{item.demerit }}</td>
                    </tr>
                    <tr>
                        <td class="text-center">Total</td>
                        <td class="text-center">75%</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
