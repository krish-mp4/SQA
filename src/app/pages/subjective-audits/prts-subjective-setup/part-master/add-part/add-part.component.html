<div class="NewHeader">
    <h1 mat-dialog-title>
        <span>{{ data ? 'Update' : 'Add'}} Parts</span>
    </h1>
</div>

<form class="form-horizontal">
    <div mat-dialog-content>
        <div class="form-group">
            <label class="control-label col-sm-4 add-member-label">Part Name: </label>
            <div class="col-lg-8 col-md-8 col-sm-8 col-xs-8">
                <input type="text" class="form-control" placeholder="Enter Part Name">
            </div>
        </div>
        <div class="form-group">
            <label class="control-label col-sm-4 add-member-label">Module Name </label>
            <div class="col-lg-8 col-md-8 col-sm-8 col-xs-8">
                <mat-select class="form-control" placeholder="Select Mudule Type" required>
                    <mat-option [value]="0">BSO</mat-option>
                    <mat-option [value]="1">Door</mat-option>
                    <mat-option [value]="2">Rear bumper</mat-option>
                    <mat-option [value]="3">Fuel Flap</mat-option>
                    <mat-option [value]="4">Upper trim</mat-option>
                </mat-select>
            </div>
        </div>
        <div class="form-group">
            <label class="control-label col-sm-4">Description: </label>
            <div class="col-lg-8 col-md-8 col-sm-8 col-xs-8">
                <textarea type="text" class="form-control" placeholder="Enter Description"></textarea>
            </div>
        </div>
    </div>
    <mat-dialog-actions align="end" style="margin-bottom: -16px;">

        <button mat-raised-button class="ms-2" (click)="close()"
            style="background-color: lightgray; color: red;margin-right: 2px;">
            <mat-icon>cancel</mat-icon>
            Close
        </button>
        <button mat-raised-button color="primary" type="button" (click)="close()">
            <mat-icon>save</mat-icon><span> {{ data ? 'Update' : 'Save'}}</span>
        </button>

    </mat-dialog-actions>
</form>
