<div class="NewHeader">
  <h1 mat-dialog-title>
    <span>{{ data ? 'Update' : 'Add' }} Issues for Defect</span>
  </h1>
</div>

<mat-dialog-content class="mat-typography">
  <div class="container-fluid">
    <div class="row align-items-center mb-2" *ngFor="let issue of issues; let i = index">

      <!-- Normal Input Box -->
      <div class="col-sm-9">
        <div class="form-group mb-0">
          <label class="form-label fw-semibold">Issue Description {{ i + 1 }}</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="issue.description"
            [name]="'issue_' + i"
            placeholder="Enter issue details"
          />
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="col-sm-3 text-start" style="margin-top: 24px;">
        <button
          mat-icon-button
          color="primary"
          (click)="addIssueField()"
          title="Add a new issue"
        >
          <mat-icon>add_circle_outline</mat-icon>
        </button>

        <button mat-icon-button title="Edit issue">
          <mat-icon>edit</mat-icon>
        </button>

        <button
          mat-icon-button
          color="warn"
          (click)="removeIssueField(i)"
          *ngIf="issues.length > 1"
          title="Delete this issue"
        >
          <mat-icon>delete</mat-icon>
        </button>
      </div>
    </div>
  </div>
</mat-dialog-content>

<!-- Footer Buttons -->
<mat-dialog-actions align="end">
  <button mat-raised-button class="btn-default" (click)="close()">
    <mat-icon>cancel</mat-icon>Close
  </button>
  <button
    mat-raised-button
    color="primary"
    style="margin-left: 8px;"
    (click)="saveIssues()"
  >
    <mat-icon>save</mat-icon>Save All
  </button>
</mat-dialog-actions>
