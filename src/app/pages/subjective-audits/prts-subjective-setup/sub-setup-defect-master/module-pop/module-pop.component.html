<div class="NewHeader">
  <h1 mat-dialog-title>Modules</h1>
</div>
<div mat-dialog-content style="overflow:hidden!important;">
  <form class="form-horizontal" novalidate style="margin-top:10px">
    <div style="margin-bottom: 10px;"><mat-checkbox class="col-sm-6">BSO</mat-checkbox></div>
    <div style="margin-bottom: 10px;"><mat-checkbox class="col-sm-6">Rear Bumper</mat-checkbox></div>
    <div style="margin-bottom: 10px;"><mat-checkbox class="col-sm-6">Door</mat-checkbox></div>
    <div style="margin-bottom: 10px;"><mat-checkbox class="col-sm-6">Fuel Flap</mat-checkbox></div>
    <div style="margin-bottom: 10px;"><mat-checkbox class="col-sm-6">Instrument Cluster</mat-checkbox></div>
    <div style="margin-bottom: 10px;"><mat-checkbox class="col-sm-6">Lighting Control Module</mat-checkbox></div>
    <div style="margin-bottom: 10px;"><mat-checkbox class="col-sm-6">Infotainment System</mat-checkbox></div>
    <div style="margin-bottom: 10px;"><mat-checkbox class="col-sm-6">Seat Control</mat-checkbox></div>
  </form>
</div>


<mat-dialog-actions align="end" style="margin-top: 10px;">
  <button mat-raised-button color="primary" (click)="close()">
    <mat-icon>save</mat-icon>Save
  </button>
  <button mat-raised-button class="CancelClass" (click)="close()">
    <mat-icon>cancel</mat-icon>Cancel
  </button>
</mat-dialog-actions>
