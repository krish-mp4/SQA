<!--Add Defect and Filter Buttons-->
<div class="col-sm-12">
  <div class="col-xs-12" style="
      margin-left: 8px;
      margin-top: 10px;
      padding-right: 0px;
      padding-left: 0px;
    ">
    <div id="grid-table-container" class="table-responsive" style="width: 99%">
      <div class="container-fluid" style="padding-right: 6px; padding-left: 1px">
        <div class="w-100">
          <div class="flex-p">
            <div class="row wrap">
              <div class="col-sm-12 no-padding">
                <div class="row-wrap">
                  <div class="w-100">
                    <div class="row">
                      <div class="col-xs-6"></div>
                      <div class="col-xs-6" style="margin-left: 5px;">
                        <div class="col-xs-6"></div>

                        <div class="col-xs-6" style="margin-left: -px">
                          <div class="">
                            <button color="primary" mat-raised-button class="pull-right btn-primary margin-right-5 mt-3"
                              (click)="adddefect(null)">
                              <mat-icon>add</mat-icon> Add Defect
                            </button>
                            <button mat-raised-button style="background-color: black;
    color: white;" class="pull-right filters-hover margin-right-10 mt-3" (click)="filterToggle = !filterToggle">
                              <mat-icon>filter_list</mat-icon> Filter
                            </button>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!--Filter Toggle-->
      <div fxLayout="row wrap" *ngIf="filterToggle">
        <div fxFlex="100" fxFlex.gt-sm fxFlex.sm class="flex-p w-100 margins"
          style="margin-left: -10px; margin-right: 7px">
          <mat-card class="filter">
            <mat-card-content>
              <div class="row">
                <div class="col-sm-4">
                  <div class="col-sm-4">
                    <label class="pull-right" style="margin-top: 6px">Module Name:</label>
                  </div>
                  <div class="col-sm-8">
                    <mat-select class="form-control" placeholder="Select Module Name" required>
                      <mat-option [value]="0">BSO</mat-option>
                      <mat-option [value]="1">Door</mat-option>
                      <mat-option [value]="2">Rear bumper</mat-option>
                      <mat-option [value]="4">Fuel Flap</mat-option>
                      <mat-option [value]="5">Upper trim</mat-option>
                      <mat-option [value]="0">Tailgate</mat-option>
                      <mat-option [value]="1">Central Console</mat-option>
                      <mat-option [value]="2">C pillar</mat-option>
                      <mat-option [value]="4">REAR SEAT</mat-option>
                    </mat-select>
                  </div>
                </div>
                <div class="col-sm-4">
                  <div class="col-sm-4">
                    <label class="pull-right" style="margin-top: 6px">Function Name:</label>
                  </div>
                  <div class="col-sm-8">
                    <mat-select class="form-control" placeholder="Select Function Name" required>
                      <mat-option [value]="0">Aesthetics</mat-option>
                      <mat-option [value]="1">Mutilation</mat-option>
                    </mat-select>
                  </div>
                </div>
                <div class="col-sm-4">
                  <div class="col-sm-4">
                    <label class="pull-right" style="margin-top: 6px">Defect Name:</label>
                  </div>
                  <div class="col-sm-8">
                    <input type="text" placeholder="Search Defect Name" class="form-control" />
                  </div>
                </div>

                <div class="col-sm-4" style="margin-top: 10px">
                  <!--Status-->
                  <div class="col-sm-4">
                    <label class="pull-right" style="margin-top: 6px">Status:</label>
                  </div>
                  <div class="col-sm-8">
                    <mat-select class="form-control" placeholder="Select Status" required>
                      <mat-option *ngFor="let option of Status" [value]="option.value">
                        {{ option.name }}
                      </mat-option>
                    </mat-select>
                  </div>
                </div>

                <div class="col-sm-4">
                  <div class="col-sm-4">
                    <!-- <label class="pull-right" style="margin-top: 6px;">Defect Name:</label> -->
                  </div>
                  <div class="col-sm-8">
                    <!-- <input type="text" placeholder="Search Defect Name" class="form-control"> -->
                  </div>
                </div>

                <!--Go and Clear Buttons-->


                <div class="row">
                  <div class="col-12 d-flex justify-content-end align-items-center gap-3">
                    <!-- Toggle Icon -->


                    <!-- Clear Button -->


                    <!-- Search Button -->
                    <button mat-raised-button color="primary" (click)="getTests()">
                      <mat-icon>search</mat-icon> Search
                    </button>

                    <button mat-raised-button class="btn-default" (click)="clearFilter(); getTests()">
                      <mat-icon>settings_backup_restore</mat-icon> Clear
                    </button>
                    <a (click)="filterToggle = !filterToggle" style="font-size: 25px; cursor: pointer;">
                      <i class="fa fa-angle-double-up" aria-hidden="true"></i>
                    </a>
                  </div>
                </div>
              </div>
            </mat-card-content>
          </mat-card>
        </div>
      </div>

      <!--Table-->

      <div class="col-sm-12" style="margin-left: -15px;width: 101%;">
        <table matSort id="example2" class="table table-bordered table-hover">
          <thead class="tbl-head">
            <tr style="text-align: center">
              <th class="text-center" style="width: 112px !important">
                Actions
              </th>
              <th>Status</th>
              <!-- <th> Seq No.</th> -->
              <th>Defect Name</th>
              <th class="theadcolor text-center">Audit Type</th>
              <!-- <th>Module Name</th> -->
              <th class="text-center">Module Names</th>
              <!-- <th>Function Name</th> -->
              <th class="text-center">Issue</th>
              <!-- <th class=" text-center">Image</th> -->


            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of values">
              <td class="text-center editDel">
                <a style="cursor: pointer; margin-right: 0px; margin-left: -5px" matTooltip="Edit"
                  (click)="adddefect(item)">
                  <i class="fa fa-edit" style="color: cornflowerblue"></i>
                </a>
                <a [ngClass]="{ 'disable-custom': !canDelete || item.TotalUsed }">
                  <i style="cursor: pointer" matTooltip="Delete" class="fa fa-trash red"
                    (click)="deleteConfirmation(item)"></i>
                </a>
              </td>
              <td class="text-center" style="text-align: center !important">
                <a [ngStyle]="{
                    color: item.status ? 'blue' : 'red',
                    cursor: 'pointer'
                  }" [ngClass]="{ 'disable-custom': !canUpdate }">
                  <span (click)="Confirmation(item)">
                    {{ item.status ? "Active" : "Inactive" }}
                  </span>
                </a>
              </td>
              <!-- <td>{{item.sqno}}</td> -->
              <td>{{ item.defectname }}</td>

              <td style="color:blue; cursor:pointer" class="text-center" (click)="openAuditTypes()">4/8</td>
              <!-- <td>{{item.modulename}}</td> -->
              <td class="text-center" style="color: blue; cursor: pointer" (click)="Modulecount()">
                4/8
              </td>
              <!-- <td>{{ item.functioname }}</td> -->
              <td class="text-center">
                <a (click)="openissue()" style="color: blue; cursor: pointer">{{
                  item.issue
                  }}</a>

                <!-- <mat-icon style="cursor: pointer;" (click)="openissue()">assignment</mat-icon> -->
              </td>

              <!-- <td class="text-center">
                <mat-icon style="cursor: pointer;" (click)="imageSource(item.sqno)">visibility
                </mat-icon>
              </td> -->
              <!-- <td >

                  <a (click)="openzone()" style="color: blue;cursor: pointer;">{{item.zone}}</a>
                </td> -->



            </tr>
          </tbody>
        </table>
        <mat-paginator [length]="totalSize" [pageIndex]="currentPage" [pageSize]="pageSize"
          [pageSizeOptions]="[5, 10, 25, 50, 100]" showFirstLastButtons></mat-paginator>
      </div>
      <!-- <div class="col-sm-3">
          <table style="margin-top: 7px;padding-left: 0px; padding-right: 0px;" matSort id="example2"
            class="table table-bordered table-hover">
            <thead class="tbl-head">
              <tr class="theadcolor text-center">
                <th>Image Displayed ( {{Sno}} )</th>
              </tr>
            </thead>
            <tbody >
              <td> <img style="height: 191px;width: 330px;" [src]="url"  /></td>
            </tbody>
          </table>
        </div> -->
    </div>
  </div>
</div>
