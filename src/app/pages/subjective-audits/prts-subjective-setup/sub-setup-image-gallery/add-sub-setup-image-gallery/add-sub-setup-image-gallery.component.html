<div class="NewHeader">
  <h1 mat-dialog-title>{{ data ? 'Update' : 'Add' }} Image</h1>
</div>

<div mat-dialog-content>
  <div class="row">
    <!-- Left Column: Form Fields -->
    <div class="col-md-8">
      <form class="form-horizontal">
                <div class="form-group">
          <label class="control-label col-sm-4 add-member-label">Module Name </label>
          <div class="col-lg-6 col-md-6 col-sm-6 col-xs-6">
            <mat-select class="form-control" placeholder="Select Module Name" required>
              <mat-option [value]="0">BSO</mat-option>
              <mat-option [value]="1">Door</mat-option>
              <mat-option [value]="2">Rear bumper</mat-option>
              <mat-option [value]="3">Fuel Flap</mat-option>
              <mat-option [value]="4">Upper trim</mat-option>
            </mat-select>
          </div>
        </div>

        <div class="form-group">
          <label class="control-label col-sm-4 add-member-label">Audit Type </label>
          <div class="col-lg-6 col-md-6 col-sm-6 col-xs-6">
            <mat-select class="form-control" placeholder="Select Audit Type" required>
              <mat-option [value]="0">Product Quality Audit</mat-option>
              <mat-option [value]="1">Body Audit</mat-option>
              <mat-option [value]="2">Paint Audit</mat-option>
            </mat-select>
          </div>
        </div>

        <div class="form-group">
          <label class="control-label col-sm-4 add-member-label">Image Title: </label>
          <div class="col-lg-6 col-md-6 col-sm-6 col-xs-6">
            <input type="text" class="form-control" placeholder="Enter Title">
          </div>
        </div>



        <div class="form-group">
          <label class="col-sm-4 control-label">Audit Seq :</label>
          <div class="col-sm-6">
            <input type="number" class="form-control" placeholder="Enter Sequence Number (1-1000)">
          </div>
        </div>

        <div class="form-group">
          <label class="col-sm-4 control-label">Dash Seq :</label>
          <div class="col-sm-6">
            <input type="number" class="form-control" placeholder="Enter Sequence Number (1-1000)">
          </div>
        </div>
      </form>
    </div>

    <!-- Right Column: Drag & Drop Upload -->
    <div class="col-md-4" style="margin-left: -20px;margin-top: 20px;">
      <label class="control-label">Attach File:</label>
      <div
        class="drop-zone"
        (dragover)="onDragOver($event)"
        (drop)="onDrop($event)"
        style="border: 2px dashed #ccc; border-radius: 5px; padding: 20px; text-align: center; background: #f9f9f9;"
      >
        <p>Drag and drop files here</p>
        <input type="file" #fileInput hidden (change)="onFileSelected($event)" />
        <button type="button" class="btn btn-outline-primary" (click)="fileInput.click()">Browse Files</button>
      </div>
    </div>
  </div>
</div>

<mat-dialog-actions align="end" style="margin-bottom: -16px;"> 
    <button mat-raised-button class="ms-2" (click)="close()"
        style="background-color: lightgray; color: red;margin-right: 5px;">
        <mat-icon>cancel</mat-icon>
        Close
      </button>
  <!-- <button type="button" class="btn btn-outline-success" style="margin-right: 10px;">Save Draft</button> -->
  <button mat-raised-button color="primary" [mat-dialog-close]="'test'">
    <mat-icon>save</mat-icon><span> {{ data ? ' Update' : ' Submit' }}</span>
  </button>
   
</mat-dialog-actions>
