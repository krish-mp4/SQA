<div class="col-sm-12" style="
    max-width: 100%;
    padding: 0;
    margin: 0;
    box-sizing: border-box;
  ">
    <div class="NewHeader">
        <h1 style="color: white; margin-top:5px" mat-dialog-title>
            {{ data ? "Update" : "Add" }} Variant
        </h1>
    </div>
    <div mat-dialog-content>
        <form class="form-horizontal">
            <!-- Complaint -->
            <div class="form-group" style="margin-top: 20px">
                <label class="control-label col-sm-4 add-member-label"> Model Name :
                </label>
                <div class="col-lg-8 col-md-8 col-sm-8 col-xs-8">
                    <select class="form-control" placeholder="Select Model Name">
                        <option value="1">Hector 7 Seater</option>
                        <option value="2">Gloster 6 Seater</option>
                        <option value="3">Innova Hycross</option>
                        <option value="4">Fortuner</option>
                        <option value="5">Accent</option>
                        <option value="6">Accord</option>
                        <option value="7">Jaguar</option>
                        <option value="8">BWM</option>
                    </select>
                </div>
            </div>
            <!-- Role -->
            <div class="form-group" style="margin-top: 20px">
                <label class="control-label col-sm-4 add-member-label">Variant Type :
                </label>
                <div class="col-lg-8 col-md-8 col-sm-8 col-xs-8">
                    <input type="text" class="form-control" placeholder="Enter Variant Type" />
                </div>
            </div>

        </form>
    </div>
    <mat-dialog-actions align="end">
        <div class="margin-bottom-10" style="margin-top: 30px; margin-right: 10px">

            <button mat-raised-button style="background-color: lightgray; color: red" class="add-dark-hover btn-default"
                (click)="close()">
                <mat-icon>cancel</mat-icon>Close
            </button>
            <button mat-raised-button color="primary" [mat-dialog-close]="'test'">
                <mat-icon>save</mat-icon> <span>{{ data ? "Update" : "Save" }}</span>
            </button>

        </div>
    </mat-dialog-actions>
</div>
