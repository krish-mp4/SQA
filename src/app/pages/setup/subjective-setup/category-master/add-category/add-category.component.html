<div class="NewHeader">
  <h1 mat-dialog-title>
    {{data ? 'Update' : 'Add'}} Category
  </h1>
</div>
<div mat-dialog-content>
  <form class="form-horizontal">
    <div class="form-group">
      <label class="control-label col-sm-4 ">Audit Type </label>
      <div class="col-lg-8 col-md-8 col-sm-8 col-xs-8">
        <mat-select class="form-control" placeholder="Select Audit Type" required>
          <mat-option [value]="0">Product Quality Audit</mat-option>
          <mat-option [value]="1">Body Audit</mat-option>
          <mat-option [value]="2">Paint Audit</mat-option>

        </mat-select>
      </div>
    </div>

    <div class="form-group">
      <label class="control-label col-sm-4 ">Category Name: </label>
      <div class="col-lg-8 col-md-8 col-sm-8 col-xs-8">
        <input type="text" class="form-control" placeholder="Enter Category">
      </div>
    </div>


  </form>
</div>

<mat-dialog-actions align="end">
  <div class="margin-bottom-10" style="margin-top: 30px; margin-right: -3px; margin-bottom: 11px;">
    <button mat-raised-button color="primary" [mat-dialog-close]="'test'">
      <mat-icon style="font-size:20px" class="mt-1">save</mat-icon> <span style="margin-left: 5px;">{{ data ? "Update" :
        "Save" }}</span>
    </button>
    <button mat-raised-button style="background-color: lightgray; color: red" class="add-dark-hover btn-default"
      (click)="close()">
      <mat-icon>cancel</mat-icon>Close
    </button>
  </div>
</mat-dialog-actions>
