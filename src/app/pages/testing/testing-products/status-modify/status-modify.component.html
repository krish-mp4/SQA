<h2 mat-dialog-title>Confirm Status Change</h2>
<mat-dialog-content>Are you sure you want to change the status?</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button color="primary" (click)="onYesClick()">Yes</button>
  <button mat-button (click)="onNoClick()">No</button>

</mat-dialog-actions>
