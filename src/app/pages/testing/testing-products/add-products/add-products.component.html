<div class="col-sm-12" style="
    max-width: 100%;
    padding: 0;
    margin: 0;
    box-sizing: border-box;
  ">
    <div class="NewHeader">
        <h1 style="color: white; margin-top:5px" mat-dialog-title>
            {{ data ? "Update" : "Add" }} Product
        </h1>
    </div>

    <div class="container mt-3">
        <div class="row mb-3">
            <!-- Product Name -->
            <label class="col-sm-3 col-form-label fw-bold">Product: <span class="text-danger">*</span></label>
            <div class="col-sm-9">
                <input type="text" class="form-control" placeholder="Enter Product">
            </div>
        </div>

        <div class="row mb-3">
            <!-- Config -->
            <label class="col-sm-3 col-form-label fw-bold">Config: <span class="text-danger">*</span></label>
            <div class="col-sm-9">
                <input type="text" class="form-control" placeholder="Config">
            </div>
        </div>

        <div class="row mb-3">
            <!-- Serial Number -->
            <label class="col-sm-3 col-form-label fw-bold">Serial No: <span class="text-danger">*</span></label>
            <div class="col-sm-9">
                <input type="text" class="form-control" placeholder="Enter Serial No">
            </div>
        </div>

        <div class="row mb-3">
            <!-- Upload Document -->
            <label class="col-sm-3 col-form-label fw-bold">Upload Document:</label>
            <div class="col-sm-9">
                <input type="file" class="form-control">
            </div>
        </div>

        <!-- Buttons -->
        <mat-dialog-actions align="end">
            <div class="margin-bottom-10" style="margin-top: 30px; margin-right: 10px">
                <button mat-raised-button color="primary" [mat-dialog-close]="'test'">
                    <mat-icon>save</mat-icon> <span>{{ data ? "Update" : "Save" }}</span>
                </button>
                <button mat-raised-button style="background-color: lightgray; color: red"
                    class="add-dark-hover btn-default" (click)="close()">
                    <mat-icon>cancel</mat-icon>Close
                </button>
            </div>
        </mat-dialog-actions>
    </div>

</div>
