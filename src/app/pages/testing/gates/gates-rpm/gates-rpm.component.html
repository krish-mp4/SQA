<div class="nav-container" [ngClass]="{'nav-open': isNavOpen, 'nav-closed': !isNavOpen}">
    <!-- Toggle Button -->
    <button (click)="toggleNav()" class="toggle-button">
        <mat-icon>menu</mat-icon>
    </button>

    <nav class="nav-links">
        <ul>
            <li routerLinkActive="active" [routerLink]="['category']">
                <a>
                    <span *ngIf="isNavOpen">Discovery</span>
                    <mat-icon  *ngIf="!isNavOpen">travel_explore</mat-icon>
                </a>
            </li>
            <li routerLinkActive="active" [routerLink]="['detection']">
                <a>
                    <span *ngIf="isNavOpen">Detection</span>
                    <mat-icon *ngIf="!isNavOpen">search</mat-icon>
                </a>
            </li>
            <li routerLinkActive="active" [routerLink]="['score-matrix']">
                <a>
                    <span *ngIf="isNavOpen">Design</span>
                    <mat-icon *ngIf="!isNavOpen">design_services</mat-icon>
                </a>
            </li>
            <li routerLinkActive="active" [routerLink]="['score-matrix']">
                <a>
                    <span *ngIf="isNavOpen">Prototyping</span>
                    <mat-icon *ngIf="!isNavOpen">precision_manufacturing</mat-icon>
                </a>
            </li>
            <li routerLinkActive="active" [routerLink]="['score-matrix']">
                <a>
                    <span *ngIf="isNavOpen">Testing</span>
                    <mat-icon *ngIf="!isNavOpen">science</mat-icon>
                </a>
            </li>
            <li routerLinkActive="active" [routerLink]="['score-matrix']">
                <a>
                    <span *ngIf="isNavOpen">Validation</span>
                    <mat-icon *ngIf="!isNavOpen">verified</mat-icon>
                </a>
            </li>
            <li routerLinkActive="active" [routerLink]="['score-matrix']">
                <a>
                    <span *ngIf="isNavOpen">Launch</span>
                    <mat-icon *ngIf="!isNavOpen">rocket_launch</mat-icon>
                </a>
            </li>
        </ul>
    </nav>
</div>

<router-outlet></router-outlet>
