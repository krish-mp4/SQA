<div class="NewHeader" style="background-color: #2865ab">
    <h1 mat-dialog-title style="color:white;">
        {{ data ? 'Update' : 'Add'}} Score Matrix
    </h1>
</div>
 
<div mat-dialog-content>
    <div class="col-sm-12" style="margin-bottom: 10px;">
        <form [formGroup]="myGroup">
            <div class="row " style="margin-bottom: 12px;">
                <div class="col-sm-4 ">
                    <label class="add-member-label  mt5 required imli" style="margin-top:5px; ">Failure Effect
                        :</label>
                </div>
                <div class="col-sm-8">
                    <input class="form-control name back" maxlength="50" placeholder="Enter Failure Effect"
                        formControlName="ScoreMatrixName" type="text" value="">
                    <div *ngIf="isSubmitting && f.ScoreMatrixName.errors" class="error-text">
                        <div *ngIf="f.ScoreMatrixName.errors.required">{{'Failure Effect Required'}}</div>
                    </div>
                    <div *ngIf="f.ScoreMatrixName.errors" class="error-text">
                        <div *ngIf="f.ScoreMatrixName.errors.pattern">{{'Invalid'}}</div>
                    </div>
                </div>
            </div>
            <div class="row" style="margin-bottom: 12px;">
                <div class="col-sm-4 ">
                    <label class="add-member-label  mt5 required imli" style="margin-top:5px; ">Severity:</label>
                </div>
                <div class="col-sm-8">
                    <input class="form-control name back" maxlength="50" placeholder="Enter Severity"
                        formControlName="Severity" type="number" value="">
                    <div *ngIf="isSubmitting && f.Severity.errors" class="error-text">
                        <div *ngIf="f.Severity.errors.required">{{'Severity Required'}}</div>
                    </div>
                </div>
            </div>
            <div style="margin-bottom: 15px;">
                <div class="pull-right">
                    <button mat-raised-button class="me-3" (click)="close()"
     style="background-color: lightgray; color: red">
      <mat-icon>cancel</mat-icon> Close
    </button> 
                    <button mat-raised-button type="submit" class="save" color="primary" style="margin-right: 5px;"
                        (click)="upsertScoreMatrix()">
                        <mat-icon>save</mat-icon> Save
                    </button>
                    
                </div>
            </div>
        </form>
    </div>
</div>
