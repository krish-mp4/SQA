<!-- Add Filter Tabs -->
<div style="margin-bottom: 50px;margin-top: 3.5%;">
    <div class="container-fluid w-50 mt-3 mb-3" style="margin-left: 42%;">
   <div class="w-50">
  <div class="flex-p">
    <div class="row">
      <div class="col-sm-12 no-padding">
        <div class="row">
          <div class="col-xs-12" style="margin-bottom: -15px;margin-left: 65%;">
            <div>
              <button mat-raised-button
                      color="primary"
                      class="pull-right btn-primary mt-3"
                      style="margin-left:10px;"matTooltip="Add Responsible Section"
                      (click)="addRespSection(null)">
                <mat-icon>add</mat-icon> Add Responsible Section
              </button>
 
              <button mat-raised-button
                      style="background-color:black;color:white"
                      class="pull-right filters-hover mt-3" matTooltip="Filter"
                      (click)="filterToggle = !filterToggle">
                <mat-icon>filter_list</mat-icon> Filter
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
 
</div>
 
<!-- Filter UI -->
<div  fxLayout="row wrap" *ngIf="filterToggle" style=" margin-bottom: 0px;">
    <div fxFlex="50" class="flex-p w-50" style="width: 81% !important;margin-left: 25px;">
        <form [formGroup]="filterForm">
            <mat-card class="filter">
                <mat-card-content>
                    <div class="row col-sm-12">
                        <div class="col-sm-4 row me-2">
                            <div class="col-sm-3 newMarginClass">
                                <b>Keyword:</b>
                            </div>
                            <div class="col-sm-9 ">
                                <input type="text" formControlName="Keyword" class="form-control"
                                    placeholder="Search Responsible Sesction">
                            </div>
                        </div>
                        <div class="col-sm-4 row me-2">
                            <div class="col-sm-3 newMarginClass">
                                <b >Status:</b>
                            </div>
                            <div class="col-sm-8">
                                <mat-select placeholder="Select Status" class="form-control" formControlName="Status">
                                    <mat-option [value]=true>
                                        Active
                                    </mat-option>
                                    <mat-option [value]=false>
                                        InActive
                                    </mat-option>
                                </mat-select>
                            </div>
                        </div>
                        <div class="col-sm-4 pull-right ">
                            <a (click)="filterToggle = !filterToggle" class="pull-right"
                                style="font-size: 25px; cursor: pointer; margin-left: 5px">
                                <i class="fa fa-angle-double-up" aria-hidden="true"></i>
                            </a>
                            <button mat-raised-button color="primary" class="pull-right" (click)="fnGetRespSections()">
                                Search
                            </button>
                            <button mat-raised-button class="pull-right btn-default margin-right-10"
                                (click)="filterForm.reset();formInit();fnGetRespSections()">
                                Clear
                            </button>
                        </div>
                        <div class="col-lg-6 col-md-6 col-sm-6 col-xs-6"></div>
                    </div>
                </mat-card-content>
            </mat-card>
        </form>
    </div>
</div>
 
<!-- Table -->
<div class="col-sm-10" style="margin-left: 10px;">
    <div>
        <div class="flex-p  ">
            <div class="row">
                <div class="col-sm-12">
                    <div id="grid-table-container" class="table-responsive">
                        <table matSort id="example2" class="table table-bordered table-hover"
                            >
                            <thead class="tbl-head">
                                <tr>
                                    <th class="text-center">Actions</th>
                                    <th class="text-center">Status</th>
                                    <th class="text-center" >Responsible Section</th>
                                    <th class="text-center">Responsible Leads</th>
                                   
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let item of tableList">
                                   
                                    <td class=" text-center">
                                        <a matTooltip="Edit" [ngClass]="{'disable-custom' : !canUpdate}"
                                            style="margin-right: 10px; cursor: pointer; color: cornflowerblue;"
                                            (click)="addRespSection(item)">
                                            <i class="fa fa-edit"></i>
                                        </a>
                                        <a [ngClass]="{'disable-custom' : !canDelete}">
                                            <i style="cursor: pointer;" matTooltip="Delete" class="fa fa-trash red"
                                                (click)="deleteConfirmation(item)"></i>
                                        </a>
                                    </td>
                                     <td class="text-center" style="text-align: center !important;">
                                        <a [ngStyle]="{'color':  item.isActive == true? 'blue' : 'red','cursor':'pointer'}"
                                            [ngClass]="{'disable-custom' : !canUpdate}">
                                            <span *ngIf="!item.isActive" (click)="Confirmation(item)"
                                                style="color:red">Inactive</span>
                                            <span *ngIf=" item.isActive" (click)="Confirmation(item)"
                                                style="color:blue;">Active</span>
                                        </a>
                                    </td>
                                    <td class="text-center" >{{item.respSectionName}}</td>
                                    <td class="text-center">{{item.EntryCount}}</td>
                                   
                                </tr>
                            </tbody>
                            <tr *ngIf="tableList == null || tableList.length == 0">
                                <td colspan="12" class="text-center">No records found</td>
                            </tr>
                        </table>
                        <mat-paginator class="col-sm-12" [length]="totalSize" [pageIndex]="currentPage"
                            [pageSize]="pageSize" [pageSizeOptions]="[5, 10, 20, 50, 100]" (page)="fnHandlePage($event)"
                            showFirstLastButtons>
                        </mat-paginator>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</div>
