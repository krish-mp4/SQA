<div class="NewHeader">
    <h1 mat-dialog-title style="color:white;">
        {{ data ? 'Update' : 'Add'}}  Project Section 
    </h1>
</div>
 
<div mat-dialog-content>
    <div class="col-sm-12" style="margin-bottom: 10px;">
        <form [formGroup]="myGroup">
            <div class="row " style="margin-bottom: 12px;">
                <div class="col-sm-4 ">
                    <label class="add-member-label  mt5 required imli" style="margin-top:5px; ">Section:</label>
                </div>
                <div class="col-sm-8">
                    <div>
                        <!-- <input class="form-control name back" formControlName="SubGroupName" maxlength="50"
                            placeholder="Enter Sub Group Name" type="text" value=""> -->
                            <mat-select class="form-control back" placeholder="Select Section">
                                 <mat-option [value]="true">Electrical Design</mat-option>
                                  <mat-option [value]="false">Hydraulic Design</mat-option>
                                   <mat-option [value]="false">Loader Design</mat-option>
                                 </mat-select>
                                  
                        <div *ngIf="isSubmitting && f.SubGroupName.errors" class="error-text">
                            <div *ngIf="f.SubGroupName.errors.required">{{'Required'}}</div>
                        </div>
                        <div *ngIf="f.SubGroupName.errors" class="error-text">
                            <div *ngIf="f.SubGroupName.errors.pattern">{{'Invalid'}}</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row " style="margin-bottom: 12px;">
                <div class="col-sm-4 ">
                    <label class="add-member-label  mt5 required " style="margin-top:5px;">Section Lead
                        :</label>
                </div>
                <div class="col-sm-8">
                    <mat-select class="form-control back" placeholder="Select Section Lead ">
                                 <mat-option [value]="true">Sai</mat-option>
                                  <mat-option [value]="false">Vamshi</mat-option>
                                   <mat-option [value]="false">Ayush</mat-option>
                                 </mat-select>
                    <div *ngIf="isSubmitting && f.respSectionId.errors" class="error-text">
                        <div *ngIf="f.respSectionId.errors.required">{{'Required'}}</div>
                    </div>
                </div>
            </div>
            <div style="margin-bottom: 15px;">
                <div class="pull-right">
                    <button mat-raised-button class="ms-2" (click)="close()"
        style="background-color: lightgray; color: red;margin-right: 10px;">
        <mat-icon>cancel</mat-icon>
        Close
      </button>
                    <button mat-raised-button type="submit" class="save"  color="primary"
                        (click)="upsertSubGroup()">
                        <mat-icon>save</mat-icon> Save
                    </button>
                     
                </div>
            </div>
        </form>
    </div>
 
</div>
