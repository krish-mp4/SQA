<div class="col-lg-12" style="overflow: hidden; ">
    <!-- <div>
        <h2 style="font-size:25px; font-weight:bold">Complaints</h2>
        <hr />
    </div> -->
    <div class="d-flex justify-content-end p-2" style="margin-right: 6px;">
        <button style="background-color: gray; color: white" class="btn btn-grey d-flex align-items-center"
            (click)="goBack()">
            <mat-icon class="me-1">arrow_back</mat-icon> Back
        </button>
    </div>

    <!-- Table -->

    <div class="col-sm-12" style="margin-top: 10px;">
        <div class="table-responsive" id="grid-table-container">
            <table class="table  table-bordered table-hover">

                <thead class="tbl-head">
                    <tr>
                        <th style="white-space:nowrap">Name</th>
                        <th>Department</th>
                        <th>Role</th>
                        <th class="text-center">Present</th>
                        <th class="text-center">Absent</th>
                        <!-- <th class="text-center" style="white-space:nowrap">Late</th> -->
                        <!-- <th class="text-center">On-Time</th> -->
                        <th class="text-center">Participation (%)</th>




                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let item of data">

                        <td>{{ item.name }}</td>
                        <td>{{ item.department }}</td>
                        <td>{{ item.role }}</td>
                        <td class="text-center">{{ item.present }}</td>
                        <td class="text-center">{{ item.absent }}</td>
                        <!-- <td class="text-center">{{ item.late }}</td> -->
                        <!-- <td class="text-center">
                            {{item.onTime}}
                        </td> -->
                        <td class="text-center" style="white-space:nowrap">
                            {{item.participation}}
                        </td>
                    </tr>
                </tbody>

            </table>
              <!-- Pagination -->
              <mat-paginator [length]="totalSize" [pageSize]="5" [pageSizeOptions]="[5, 10, 25, 50, 100]"
              showFirstLastButtons>
          </mat-paginator>
        </div>

    </div>

    <!-- Table -->
</div>
